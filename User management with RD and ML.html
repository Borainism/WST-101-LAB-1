<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Task 2: Mobile-First Header */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            background: #f4f4f4;
        }
        nav ul {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
            padding: 0;
        }

        /* Task 5.2: Custom markers */
        dl dd::marker { content: "▹ "; color: #e67e22; }
        details summary { cursor: pointer; font-weight: bold; margin-bottom: 10px; }

        /* Task 7: Hover Animation */
        .btn-animate {
            padding: 10px 20px;
            cursor: pointer;
        }
        .btn-animate:hover {
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); background-color: #ffffff; }
            to { transform: scale(1.05); background-color: #f0f0f0; }
        }

        /* Desktop Breakpoint */
        @media (min-width: 769px) {
            header { flex-direction: row; justify-content: space-between; }
            nav ul { flex-direction: row; }
        }
    </style>
</head>
<body>
    <header>
        <h2>Welcome back, Rain Michael</h2>
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <main style="padding: 20px;">
        <h3>Your Previous Purchases</h3>
        <details>
            <summary>Order History</summary>
            <dl>
                <dt>Item:</dt>
                <dd>Canvas Tote Bag - Black</dd>
            </dl>
        </details>
        <br>
        <button class="btn-animate">Edit Profile</button>
    </main>
</body>
</html>
