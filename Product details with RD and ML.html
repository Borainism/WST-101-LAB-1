<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Task 5.2: Prevent horizontal scroll */
        .table-wrapper {
            overflow-x: auto;
            margin: 20px 0;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <main>
        <h1>Oversized Heavyweight Hoodie</h1>

        <div class="table-wrapper">
            <table>
                <caption>Technical Specifications</caption>
                <tr><th>Material</th><td>100% Organic Cotton</td></tr>
                <tr><th>Weight</th><td>450 GSM</td></tr>
            </table>
        </div>

        <section id="reviews">
            <h2>Customer Reviews</h2>
            <article>
                <header><strong>Rain A.</strong></header>
                <blockquote>"The quality is incredible."</blockquote>
            </article>
        </section>
    </main>
</body>
</html>
