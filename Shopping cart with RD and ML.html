<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Task 4.1: Flexbox alignment for list items */
        .cart-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Shopping Cart</h1>
    <ul class="cart-list">
        <li>
            <h3>Oversized Heavyweight Hoodie</h3>
            <p class="price">$90.00</p>
        </li>
    </ul>
</body>
</html>
